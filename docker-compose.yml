services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${APP_IMAGE:-tugas-akhir-app:latest}
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      SERVER_NAME: ${SERVER_NAME:-:80}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - storage_data:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  queue:
    image: ${APP_IMAGE:-tugas-akhir-app:latest}
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
    command: php artisan queue:work --verbose --tries=3 --sleep=3 --timeout=120
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - storage_data:/app/storage

  db:
    image: mysql:8.4
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_0900_ai_ci
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-tugas_akhir}
      MYSQL_USER: ${DB_USERNAME:-tugas_akhir}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change-root-password}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
  storage_data:
